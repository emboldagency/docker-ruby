name: Build and Deploy Ruby

on:
  push:
    branches: # Added this to keep cache warm on main commits
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      skip-jobs:
        description: "Space-separated list of jobs to skip"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  LATEST_UBUNTU: "24.04"
  LATEST_RUBY: "4.0.1"

jobs:
  initialization:
    runs-on: ubuntu-latest
    outputs:
      skip-build: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event.inputs['skip-jobs'] }}" == *"build-and-push-docker"* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  build-and-push-docker:
    needs: initialization
    if: needs.initialization.outputs.skip-build != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false # Don't stop all jobs if one Ruby version fails
      matrix:
        ruby_version:
          [
            "4.0.1",
            "3.4.9",
            "3.3.10",
            "3.3.1",
            "3.2.10",
            "3.1.7",
            "3.0.7",
            "2.7.8",
          ]
        ubuntu_version: ["24.04"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=match,pattern=v(.*),group=1,prefix=${{ matrix.ruby_version }}-ubuntu${{ matrix.ubuntu_version }}-
            type=raw,value=${{ matrix.ruby_version }}-ubuntu${{ matrix.ubuntu_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./build
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RUBY_VERSION=${{ matrix.ruby_version }}
            UBUNTU_VERSION=${{ matrix.ubuntu_version }}
          cache-from: type=gha,scope=ruby-${{ matrix.ruby_version }}-ubuntu-${{ matrix.ubuntu_version }}
          cache-to: type=gha,mode=max,scope=ruby-${{ matrix.ruby_version }}-ubuntu-${{ matrix.ubuntu_version }}

  update-coder-template:
    needs: [initialization, build-and-push-docker]
    # Only run if not cancelled AND triggered by a tag AND not explicitly skipped AND (build was skipped OR build succeeded)
    if: ${{ !cancelled() && github.ref_type == 'tag' && !contains(github.event.inputs['skip-jobs'], 'update-coder-template') && (needs.initialization.outputs.skip-build == 'true' || needs.build-and-push-docker.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Coder
        uses: coder/setup-action@v1
        with:
          access_url: https://embold.dev
          coder_session_token: ${{ secrets.CODER_TOKEN }}

      - name: Push Coder Template
        env:
          # Map the secret to a shell variable to avoid injection/escaping issues
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          coder templates push ruby \
            --directory . \
            --name "${{ github.ref_name }}" \
            --message "Release: ${{ github.ref_name }}" \
            --var "GHP_REGISTRY_PASS=${GHCR_TOKEN}" \
            --activate=false \
            --yes
